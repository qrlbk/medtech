name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lightweight test deps
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 lxml rapidfuzz tenacity requests pytest ruff \
            sqlalchemy pydantic pydantic-settings
      - name: Lint
        run: ruff check parsers app || true
      - name: Run offline tests (parsers + quality, no DB/network needed)
        env:
          MEDPRICE_OFFLINE: "1"
        run: pytest parsers/tests tests/test_quality.py tests/test_text.py -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
